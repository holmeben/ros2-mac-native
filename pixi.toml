[workspace]
authors = ["Ben Holme <77072232+holmeben@users.noreply.github.com>"]
channels = ["conda-forge", "https://prefix.dev/robostack-jazzy"]
name = "ros2_ws"
platforms = ["osx-arm64", "osx-64"]
version = "0.1.0"

[activation]
scripts = ["install/setup.zsh", "copy_dylibs.sh"]

[activation.env]
RMW_IMPLEMENTATION = "rmw_cyclonedds_cpp" 
TURTLEBOT3_MODEL = "waffle" 
CC = "$CONDA_PREFIX/bin/clang"
CFLAGS = "-isystem $CONDA_PREFIX/include"
CXX = "$CONDA_PREFIX/bin/clang++"
CXXFLAGS = "-isystem $CONDA_PREFIX/include"
LDFLAGS = "-Wl,-rpath,$CONDA_PREFIX/lib -L$CONDA_PREFIX/lib"

[dependencies]
clang = "21.*"
clangxx = "21.*"
ros-jazzy-desktop-full = ">=0.11.0,<0.12"
colcon-common-extensions = ">=0.3.0,<0.4"
colcon-mixin = ">=0.2.3,<0.3"
cmake = ">=4.2.1,<5"
ninja = ">=1.13.2,<2"
mold = ">=2.40.4,<3"
sccache = ">=0.13.0,<0.14"
ogre-next = ">=2.3.3,<3"
ogre = ">=1.10.12.1,<2"
dartsim = ">=6.15.0,<7"
ros-jazzy-turtlebot3 = ">=2.3.3,<3"
ros-jazzy-turtlebot3-gazebo = ">=2.3.7,<3"
ros-jazzy-cartographer = ">=2.0.0,<3"
ros-jazzy-cartographer-ros = ">=2.0.9003,<3"
ros-jazzy-rviz2 = ">=14.1.12,<15"
ros-jazzy-perception = ">=0.11.0,<0.12"
ros-jazzy-perception-pcl = ">=2.6.2,<3"
ros-jazzy-pcl-ros = ">=2.6.2,<3"
ros-jazzy-pcl-conversions = ">=2.6.2,<3"
pcl = ">=1.15.0,<2"
ros-jazzy-nav2-route = ">=1.3.11,<2"
ros-jazzy-ros2plugin = ">=5.4.4,<6"
ros-jazzy-ros-gz = ">=1.0.19,<2"
ros-jazzy-simulation-interfaces = ">=1.2.0,<2"
ros-jazzy-turtlebot3-simulations = ">=2.3.7,<3"
ros-jazzy-turtlebot3-fake-node = ">=2.3.7,<3"
cctools = ">=949.0.1"
ld64 = ">=530"
llvm-openmp = "*"
eigen = ">=3.4.0,<4"
xtl = "*"
doctest = "*"
